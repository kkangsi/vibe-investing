<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>티커 조회 — AI Investor</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         max-width: 720px; margin: 40px auto; padding: 0 24px; color: #222; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: #666; margin-bottom: 24px; }
  .search { display: flex; gap: 8px; margin: 16px 0; }
  .search input { flex: 1; padding: 10px 12px; font-size: 16px; border: 1px solid #ccc;
                  border-radius: 6px; }
  .search button { padding: 10px 18px; background: #1976d2; color: white; border: none;
                   border-radius: 6px; font-weight: 600; cursor: pointer; }
  .search button:hover { background: #1565c0; }
  .quick { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 24px; }
  .quick a { background: #f0f4ff; color: #1976d2; padding: 4px 10px; border-radius: 12px;
             text-decoration: none; font-size: 13px; }
  .result { border: 1px solid #e2e2e2; border-radius: 8px; padding: 20px; background: white;
            margin-top: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .result.hidden { display: none; }
  .price { font-size: 32px; font-weight: 700; color: #1976d2; margin-bottom: 4px; }
  .change { font-size: 16px; font-weight: 600; }
  .change.positive { color: #1b5e20; }
  .change.negative { color: #c62828; }
  .meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 16px;
          margin-top: 16px; font-size: 13px; color: #555; }
  .meta div span { color: #888; }
  .footer-info { margin-top: 16px; font-size: 12px; color: #888; border-top: 1px solid #f0f0f0;
                 padding-top: 12px; }
  .error { color: #c62828; padding: 16px; background: #ffebee; border-radius: 6px; }
  .loading { color: #888; font-style: italic; }
  .disclaimer { background: #fff8e1; border-left: 4px solid #f9a825;
                 padding: 12px 16px; margin: 24px 0; font-size: 13px; }
  .back { font-size: 13px; color: #1976d2; text-decoration: none; }
</style>
</head>
<body>

<a class="back" href="/">← 메인으로</a>
<h1>티커 조회</h1>
<p class="subtitle">미국 주식 + 인기 ETF + 암호화폐 + 한국 대표주 가격을 빠르게 확인합니다.</p>

<div class="search">
  <input id="ticker-input" type="text" placeholder="예: NVDA, TSLA, BTC-USD, 005930.KS"
         autocomplete="off" autofocus>
  <button id="search-btn">조회</button>
</div>

<div class="quick">
  <a href="#" data-t="NVDA">NVDA</a>
  <a href="#" data-t="TSLA">TSLA</a>
  <a href="#" data-t="AAPL">AAPL</a>
  <a href="#" data-t="MSFT">MSFT</a>
  <a href="#" data-t="GOOGL">GOOGL</a>
  <a href="#" data-t="QQQ">QQQ</a>
  <a href="#" data-t="SPY">SPY</a>
  <a href="#" data-t="BTC-USD">BTC</a>
  <a href="#" data-t="ETH-USD">ETH</a>
  <a href="#" data-t="005930.KS">삼성전자</a>
</div>

<div id="result" class="result hidden"></div>

<div class="disclaimer">
  ⚠ 본 응답은 투자 자문이 아닙니다. AI/외부 데이터 출처에 오류가 있을 수 있으며,
  실제 투자 판단은 전문가의 조언이 필요합니다.
</div>

<script>
const API_BASE = "https://func-aiinvestor-prod.azurewebsites.net/api/data";

const input = document.getElementById('ticker-input');
const btn = document.getElementById('search-btn');
const result = document.getElementById('result');

function fmtPrice(v, currency) {
  if (v === null || v === undefined) return '—';
  const sym = currency === 'KRW' ? '₩' : '$';
  return sym + v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtBigNumber(v) {
  if (v === null || v === undefined) return '—';
  if (v >= 1e12) return (v/1e12).toFixed(2) + 'T';
  if (v >= 1e9)  return (v/1e9).toFixed(2)  + 'B';
  if (v >= 1e6)  return (v/1e6).toFixed(2)  + 'M';
  return v.toLocaleString();
}

async function lookup(t) {
  const ticker = (t || input.value || '').trim();
  if (!ticker) return;
  result.className = 'result';
  result.innerHTML = '<div class="loading">조회 중…</div>';
  try {
    const r = await fetch(`${API_BASE}/${encodeURIComponent(ticker)}`, { mode: 'cors' });
    if (!r.ok) {
      result.innerHTML = `<div class="error">조회 실패 (HTTP ${r.status})</div>`;
      return;
    }
    const d = await r.json();
    const cacheSrc = r.headers.get('X-Cache-Source') || '?';
    const change = d.change_percent_24h;
    const cls = change > 0 ? 'positive' : change < 0 ? 'negative' : '';
    const sign = change > 0 ? '▲ +' : change < 0 ? '▼ ' : '';
    result.innerHTML = `
      <div style="font-size:14px;color:#888;">${d.name || d.ticker} (${d.ticker})</div>
      <div class="price">${fmtPrice(d.price, d.currency)}</div>
      <div class="change ${cls}">${change != null ? sign + change.toFixed(2) + '%' : '—'} <span style="font-size:13px;color:#888;">(24h)</span></div>
      <div class="meta">
        <div><span>시가총액</span> ${fmtBigNumber(d.market_cap)}</div>
        <div><span>P/E</span> ${d.pe_ratio != null ? d.pe_ratio.toFixed(2) : '—'}</div>
        <div><span>통화</span> ${d.currency || '—'}</div>
        <div><span>출처</span> ${d.source || '—'}</div>
      </div>
      <div class="footer-info">
        조회 시각: ${d.fetched_at} · 다음 갱신: ${d.next_refresh_at} · TTL: ${d.ttl_minutes}분 · 캐시: ${cacheSrc}
      </div>
    `;
  } catch (e) {
    result.innerHTML = `<div class="error">네트워크 오류: ${e.message}</div>`;
  }
}

btn.addEventListener('click', () => lookup());
input.addEventListener('keypress', e => { if (e.key === 'Enter') lookup(); });
document.querySelectorAll('.quick a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    input.value = a.dataset.t;
    lookup(a.dataset.t);
  });
});
</script>
</body>
</html>
